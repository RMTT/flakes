  - &admin BD15904159AF89DEB3A61039DFAFB71F7972D48D

  # age for different hosts
  - &mtspc-age age18ty94l69h64jrwsrq59052a6zeh8k0sue5n4ycc2sm63e9k5pa4qd08qh6
  - &cn2-box-age age1xsexrshfte590ec343puza8m7l9442u79hau6dpdu7ndjhaeav4slqhqwx
  - &kube-runner-age age1y498pq4h0mauklsvxfjmte3jchnupk5s83pu493k3kzm5su444sqnlpdgl
  - &agent-age age1xh8kkfq4mkvzavzq8vufaxdugwp9tg0p4geupelujn3048mynvnspj4phw
  - &oracle-age age19l23k7uhlvazvrqvpwkyupzn3g03v8djr6xf0qpfe8a8l0gvrs8qc057fk

