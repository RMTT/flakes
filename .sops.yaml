creation_rules:
  - path_regex: services/.*
    pgp: *admin

  - path_regex: home/.*
    age: *mtspc-home-age
    pgp: *admin

  - path_regex: nixos/hosts/kube-runner/.*
    pgp: *admin
    age: *kube-runner-age
  - path_regex: nixos/hosts/cn2-box/.*
    pgp: *admin
    age: *cn2-box-age
  - path_regex: nixos/hosts/agent/.*
    pgp: *admin
    age: *agent-age
  - path_regex: nixos/hosts/oracle/.*
    pgp: *admin
    age: *oracle-age

  # godel sub modules
  - path_regex: nixos/modules/godel/k3s/.*
    pgp: *admin
    age: *godel-age
  - path_regex: nixos/modules/godel/prometheus/.*
    pgp: *admin
    age:
      - *oracle-age

  - path_regex: dns/.*
    pgp: *admin

  - pgp: *admin # default
