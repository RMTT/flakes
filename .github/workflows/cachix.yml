name: Build and push to Cachix

on:
  push:
    branches: main
  pull_request:

env:
  CACHIX_CACHE: mts-flakes

  X86_TARGETS: >-
    .#nixosConfigurations.cn2-box.config.system.build.toplevel
    .#nixosConfigurations.kube-runner.config.system.build.toplevel
    .#nixosConfigurations.agent.config.system.build.toplevel
    .#nixosConfigurations.mtspc.config.system.build.toplevel
    .#nixosConfigurations.labrouter.config.system.build.toplevel

  ARM_TARGETS: >-
    .#nixosConfigurations.oracle.config.system.build.toplevel

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: |
          for target in $X86_TARGETS; do
            nix build "$target" --accept-flake-config
          done

  build-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: |
          for target in $ARM_TARGETS; do
            nix build "$target" --accept-flake-config
          done
