apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    additionalArguments:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.cloudflare.acme.email=iamrmttt@gmail.com"
      - "--certificatesresolvers.cloudflare.acme.storage=/data/acme.json"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.propagation.delayBeforeChecks=15"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=223.5.5.5:53,8.8.8.8:53"
    env:
      - name: CLOUDFLARE_DNS_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-secret
            key: api-token
    service:
      type: ClusterIP
    ports:
      websecure:
        port: 443
        hostPort: 443
      web:
        port: 80
        hostPort: 80
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
    persistence:
      enabled: true
      size: 128Mi
