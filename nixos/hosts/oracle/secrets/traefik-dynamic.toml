[http.serversTransports.ignorecert]
  insecureSkipVerify = true

[http.routers.traefik-dashboard]
    rule = "Host(`oracle.proxy.rmtt.tech`)"
    entryPoints = ["websecure"]
    service = "api@internal"
    tls = { certResolver = "dnsresolver" }

[http.routers.uptime]
  rule = "Host(`status.rmtt.tech`)"
  entryPoints = ["websecure"]
  service = "uptime"
  tls = { certResolver = "dnsresolver" }

[http.services.uptime.loadBalancer]
    passHostHeader = true
    [[http.services.uptime.loadBalancer.servers]]
        url = "http://oracle.infra.rmtt.host:8090"

[http.routers.grafana]
  rule = "Host(`grafana.rmtt.tech`)"
  entryPoints = ["websecure"]
  service = "grafana"
  tls = { certResolver = "dnsresolver" }
[http.services.grafana.loadBalancer]
    passHostHeader = true
    [[http.services.grafana.loadBalancer.servers]]
        url = "http://oracle.infra.rmtt.host:3000"
