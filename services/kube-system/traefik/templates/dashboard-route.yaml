apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  annotations:
    helm.sh/hook: post-install,post-upgrade
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`k3s.proxy.rmtt.tech`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
