csi-driver-nfs:
  customLabels:
    app: csi-driver-nfs
  node.nodeSelector:
    kubernetes.io/hostname: kube-runner
  storageClass.create: true
  storageClasses:
  - name: nas
    parameters:
      server: nas.infra.rmtt.host
      share: /mnt/main/kubernetes
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    mountOptions:
      - nfsvers=4.2
      - async
      - noatime
