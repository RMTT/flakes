apiVersion: v1
kind: Secret
metadata:
  name: authelia-config
type: Opaque
stringData:
  configuration.yml: |
    ---
    theme: 'dark'
    server:
      address: 'tcp://:9091/'
    identity_validation:
      reset_password:
        jwt_secret: {{ .Values.secrets.jwtSecret | quote }}
    authentication_backend:
      file:
        path: /config/users_database.yml
    session:
      secret: {{ .Values.secrets.sessionSecret | quote }}
      cookies:
        - domain: {{ .Values.config.domain | quote }}
          authelia_url: {{ .Values.config.autheliaUrl | quote }}
    storage:
      encryption_key: {{ .Values.secrets.storageEncryptionKey | quote }}
      local:
        path: '/data/db.sqlite3'
    access_control:
      default_policy: 'deny'
      rules:
        - domain: '*.{{ .Values.config.domain }}'
          policy: 'one_factor'
    notifier:
      filesystem:
        filename: '/config/notification.txt'
    identity_providers:
      oidc:
        hmac_secret: {{ .Values.secrets.oidcHmacSecret | quote }}
        jwks:
          - algorithm: 'RS256'
            use: 'sig'
            key: |
{{ .Values.secrets.oidcJwksKey | indent 14 }}
        claims_policies:
          default:
            id_token: ['email', 'groups', 'name','email_verified']
        clients:
{{ toYaml .Values.oidcClients | indent 10 }}
